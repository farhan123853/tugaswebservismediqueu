<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediQueue - Sistem Antrian Klinik</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Sistem antrian klinik modern dan responsif">
</head>
<body>
    <div class="auth-container">
        <div class="card">
            <h1 class="title">MediQueue</h1>
            <p class="subtitle">Sistem Antrian & Appointment Klinik</p>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')">Login</div>
                <div class="tab" onclick="switchTab('register')">Register</div>
            </div>

            <!-- Login Form -->
            <div id="login-form" class="tab-content active">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" class="form-control" required placeholder="Masukkan email anda">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" class="form-control" required placeholder="Masukkan password anda">
                    </div>
                    <button type="submit" class="btn btn-primary">Masuk</button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="register-form" class="tab-content">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="reg-nama">Nama Lengkap</label>
                        <input type="text" id="reg-nama" class="form-control" required placeholder="Nama lengkap anda">
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" class="form-control" required placeholder="Email valid">
                    </div>
                    <div class="form-group">
                        <label for="reg-hp">No. Handphone</label>
                        <input type="tel" id="reg-hp" class="form-control" required placeholder="08xxxxxxxxxx">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" class="form-control" required placeholder="Minimal 6 karakter">
                    </div>
                    <button type="submit" class="btn btn-primary">Daftar</button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="app.js"></script>
    <script>
        // Redirect if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user'));
            if (token && user) {
                if (user.role === 'pasien') {
                    window.location.href = 'dashboard.html';
                } else if (user.role === 'petugas') {
                    window.location.href = 'petugas.html';
                }
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }
    </script>
</body>
</html>
