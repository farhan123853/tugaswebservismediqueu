<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pasien - MediQueue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            MediQueue
        </div>
        <div class="user-info">
            <span id="user-name-display" style="font-weight: 500;"></span>
            <button class="logout-btn" onclick="logout()">Keluar</button>
        </div>
    </nav>

    <div class="container">
        <div class="grid grid-cols-2">
            <!-- Form Ambil Antrian -->
            <div class="widget">
                <h3 class="widget-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                    Ambil Antrian Baru
                </h3>
                <form onsubmit="handleTakeQueue(event)">
                    <div class="form-group">
                        <label for="poli">Pilih Poli</label>
                        <select id="poli" class="form-control" required>
                            <option value="">-- Pilih Poli --</option>
                            <option value="Umum">Poli Umum</option>
                            <option value="Gigi">Poli Gigi</option>
                            <option value="Anak">Poli Anak</option>
                            <option value="Mata">Poli Mata</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="keluhan">Keluhan Singkat</label>
                        <textarea id="keluhan" class="form-control" rows="3" required placeholder="Jelaskan keluhan anda..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Ambil Nomor Antrian</button>
                </form>
            </div>

            <!-- Status Antrian Saat Ini -->
            <div class="widget">
                <h3 class="widget-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Status Antrian Anda
                </h3>
                <div id="active-queue-container">
                    <div class="empty-state">
                        Memuat data antrian...
                    </div>
                </div>
            </div>
        </div>

        <!-- Riwayat -->
        <div class="widget" style="margin-top: 2rem;">
            <h3 class="widget-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Riwayat Kunjungan
            </h3>
            <div class="table-container">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Nomor Antrian</th>
                            <th>Poli</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth('pasien');
            loadPatientData();
            
            // Auto refresh status every 10 seconds
            setInterval(loadQueueStatus, 10000);
        });
    </script>
</body>
</html>
